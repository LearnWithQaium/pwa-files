<!DOCTYPE html>
<html>
<head>
  <title>Academy App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>Academy App</header>

<div class="container">

  <div class="card">
    <h2>Math Course</h2>
    <p>Learn mathematics step by step</p>
    <a href="#" class="btn">Open</a>
  </div>

  <div class="card">
    <h2>Science Course</h2>
    <p>Explore science lessons</p>
    <a href="#" class="btn">Open</a>
  </div>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
    .then(() => console.log("PWA Ready"))
    .catch(err => console.log(err));
}
</script>

</body>
</html>
